replicaCount: 4

env:
  - name: HOST
    value: "0.0.0.0"
  - name: PORT
    value: "5000"
  - name: DEBUG
    value: "false"

appEnv: "production"
logLevel: "info"

persistence:
  enabled: true
  size: 200Mi
  accessMode: ReadWriteOnce
  storageClass: ""
  mountPath: /data
  visitsFile: /data/visits

secrets:
  username: "prod-user"
  password: "prod-password"
  apiKey: "prod-api-key"

vault:
  enabled: true
  role: "devops-info-service"
  secretPath: "secret/devops-info-service/config"
  template:
    enabled: true

service:
  type: LoadBalancer
  port: 80
  nodePort: null
  sessionAffinity: None
  annotations: {}

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
    scheme: HTTP
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
    scheme: HTTP
  initialDelaySeconds: 8
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

startupProbe:
  httpGet:
    path: /health
    port: http
    scheme: HTTP
  initialDelaySeconds: 0
  periodSeconds: 2
  timeoutSeconds: 3
  failureThreshold: 30
