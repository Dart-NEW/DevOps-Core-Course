{{- if and .Values.rollout.enabled (eq .Values.rollout.strategy "blueGreen") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-info-service.previewServiceName" . }}
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
    {{- with .Values.commonLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  type: {{ .Values.rollout.blueGreen.previewService.type }}
  sessionAffinity: {{ .Values.service.sessionAffinity }}
  selector:
    {{- include "devops-info-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: http
      {{- if and (or (eq .Values.rollout.blueGreen.previewService.type "NodePort") (eq .Values.rollout.blueGreen.previewService.type "LoadBalancer")) .Values.rollout.blueGreen.previewService.nodePort }}
      nodePort: {{ .Values.rollout.blueGreen.previewService.nodePort }}
      {{- end }}
{{- end }}
