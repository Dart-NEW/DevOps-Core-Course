apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-info-service-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Dart-NEW/DevOps-Core-Course.git
    targetRevision: lab12
    path: k8s/devops-info-service
    helm:
      valueFiles:
        - values-prod.yaml
      parameters:
        - name: service.type
          value: NodePort
        - name: service.nodePort
          value: "30085"
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
