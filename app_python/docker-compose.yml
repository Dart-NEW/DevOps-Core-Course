services:
  devops-info-service:
    build:
      context: .
    image: devops-info-service-python:lab12
    ports:
      - "5000:5000"
    environment:
      HOST: "0.0.0.0"
      PORT: "5000"
      DEBUG: "false"
      VISITS_FILE: "/app/data/visits"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:5000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
