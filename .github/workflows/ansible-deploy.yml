name: Ansible Deployment

on:
  push:
    branches: [main, master]
    paths:
      - 'ansible/vars/app_python.yml'
      - 'ansible/playbooks/deploy_python.yml'
      - 'ansible/playbooks/deploy.yml'
      - 'ansible/roles/web_app/**'
      - '.github/workflows/ansible-deploy.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'ansible/vars/app_python.yml'
      - 'ansible/playbooks/deploy_python.yml'
      - 'ansible/playbooks/deploy.yml'
      - 'ansible/roles/web_app/**'
      - '.github/workflows/ansible-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ansible-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint

      - name: Install required Ansible collections
        run: ansible-galaxy collection install -r ansible/requirements.yml

      - name: Run ansible-lint
        run: |
          ansible-lint ansible/playbooks/*.yml
          ansible-lint ansible/roles

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Ansible and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Configure SSH access
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Create CI inventory
        run: |
          cat > ansible/inventory/hosts.ci.ini <<EOF
          [webservers]
          target ansible_host=${{ secrets.VM_HOST }} ansible_user=${{ secrets.VM_USER }} ansible_ssh_private_key_file=~/.ssh/id_rsa
          EOF

      - name: Deploy Python application
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          echo "$ANSIBLE_VAULT_PASSWORD" > /tmp/vault_pass
          ansible-playbook ansible/playbooks/deploy_python.yml \
            -i ansible/inventory/hosts.ci.ini \
            --vault-password-file /tmp/vault_pass
          rm -f /tmp/vault_pass

      - name: Verify deployment
        run: |
          sleep 10
          curl -fsS "http://${{ secrets.VM_HOST }}:8000"
          curl -fsS "http://${{ secrets.VM_HOST }}:8000/health"