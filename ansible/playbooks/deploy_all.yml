---
- name: Deploy All Applications
  hosts: webservers
  become: true

  tasks:
    - name: Deploy Python App
      ansible.builtin.include_role:
        name: web_app
      vars:
        web_app_name: devops-python
        web_app_docker_image: "{{ dockerhub_username | default('your_dockerhub_username') }}/devops-info-service-python"
        web_app_docker_tag: latest
        web_app_port: 8000
        web_app_internal_port: 5000
        web_app_compose_project_dir: "/opt/devops-python"
      tags:
        - app_deploy
        - python_app

    - name: Deploy Bonus App
      ansible.builtin.include_role:
        name: web_app
      vars:
        web_app_name: devops-go
        web_app_docker_image: "{{ dockerhub_username | default('your_dockerhub_username') }}/devops-info-service-go"
        web_app_docker_tag: latest
        web_app_port: 8001
        web_app_internal_port: 8080
        web_app_compose_project_dir: "/opt/devops-go"
      tags:
        - app_deploy
        - bonus_app
