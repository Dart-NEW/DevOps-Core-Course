---
- name: Deploy monitoring stack with Docker Compose
  become: true
  block:
    - name: Start monitoring services
      community.docker.docker_compose_v2:
        project_src: "{{ monitoring_project_dir }}"
        state: present
        pull: always
        recreate: auto

    - name: Wait for Loki port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ monitoring_loki_port }}"
        delay: 2
        timeout: 60

    - name: Wait for Grafana port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ monitoring_grafana_port }}"
        delay: 2
        timeout: 60

    - name: Verify Loki readiness
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ monitoring_loki_port }}/ready"
        method: GET
        status_code: 200

    - name: Verify Grafana health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ monitoring_grafana_port }}/api/health"
        method: GET
        status_code: 200

  rescue:
    - name: Report monitoring deployment failure
      ansible.builtin.debug:
        msg: "Monitoring deployment failed in {{ monitoring_project_dir }}"
