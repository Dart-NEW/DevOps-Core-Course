---
- name: Create monitoring directory tree
  become: true
  block:
    - name: Ensure monitoring directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ monitoring_project_dir }}"
        - "{{ monitoring_project_dir }}/loki"
        - "{{ monitoring_project_dir }}/promtail"
        - "{{ monitoring_project_dir }}/prometheus"
        - "{{ monitoring_project_dir }}/grafana"
        - "{{ monitoring_project_dir }}/grafana/dashboards"
        - "{{ monitoring_project_dir }}/grafana/provisioning"
        - "{{ monitoring_project_dir }}/grafana/provisioning/dashboards"
        - "{{ monitoring_project_dir }}/grafana/provisioning/datasources"

    - name: Template monitoring docker-compose
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ monitoring_project_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Template Loki config
      ansible.builtin.template:
        src: loki-config.yml.j2
        dest: "{{ monitoring_project_dir }}/loki/config.yml"
        mode: "0644"

    - name: Template Promtail config
      ansible.builtin.template:
        src: promtail-config.yml.j2
        dest: "{{ monitoring_project_dir }}/promtail/config.yml"
        mode: "0644"

    - name: Template Grafana datasource config
      ansible.builtin.template:
        src: grafana-datasource.yml.j2
        dest: "{{ monitoring_project_dir }}/grafana/provisioning/datasources/loki.yml"
        mode: "0644"

    - name: Template Grafana dashboard provider config
      ansible.builtin.template:
        src: grafana-dashboards.yml.j2
        dest: "{{ monitoring_project_dir }}/grafana/provisioning/dashboards/dashboards.yml"
        mode: "0644"

    - name: Template Prometheus config
      ansible.builtin.template:
        src: prometheus.yml.j2
        dest: "{{ monitoring_project_dir }}/prometheus/prometheus.yml"
        mode: "0644"

    - name: Template Grafana dashboard JSON
      ansible.builtin.template:
        src: grafana-dashboard.json.j2
        dest: "{{ monitoring_project_dir }}/grafana/dashboards/lab07-logs.json"
        mode: "0644"

    - name: Template Grafana metrics dashboard JSON
      ansible.builtin.template:
        src: grafana-metrics-dashboard.json.j2
        dest: "{{ monitoring_project_dir }}/grafana/dashboards/lab08-metrics.json"
        mode: "0644"
