---
- name: Validate required Docker Hub credentials
  ansible.builtin.assert:
    that:
      - dockerhub_username is defined
      - dockerhub_password is defined
      - dockerhub_username | length > 0
      - dockerhub_password | length > 0
    fail_msg: "dockerhub_username/dockerhub_password must be provided via Ansible Vault in group_vars/all.yml"

- name: Login to Docker Hub
  community.docker.docker_login:
    registry_url: https://index.docker.io/v1/
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
  no_log: true

- name: Pull application image
  community.docker.docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_image_tag }}"
    source: pull

- name: Gather existing container information
  community.docker.docker_container_info:
    name: "{{ app_container_name }}"
  register: app_container_info

- name: Stop existing container if running
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: stopped
  when:
    - app_container_info.exists
    - app_container_info.container.State.Status == 'running'

- name: Remove old container if exists
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent
  when: app_container_info.exists

- name: Run application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    state: started
    restart_policy: "{{ app_restart_policy }}"
    published_ports:
      - "{{ app_port }}:5000"
    env: "{{ app_env }}"
  notify: restart app container

- name: Wait for application port
  ansible.builtin.wait_for:
    host: "127.0.0.1"
    port: "{{ app_port }}"
    delay: 2
    timeout: 60

- name: Verify health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_port }}{{ app_healthcheck_path }}"
    method: GET
    status_code: 200
  register: app_health

- name: Show health endpoint response summary
  ansible.builtin.debug:
    msg: "Health check status={{ app_health.status }}"
