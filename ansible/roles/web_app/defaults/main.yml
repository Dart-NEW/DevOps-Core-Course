---
app_name: devops-app
docker_image: "{{ dockerhub_username | default('your_dockerhub_username') }}/devops-info-service-python"
docker_tag: latest
app_port: 8000
app_internal_port: 5000
app_restart_policy: unless-stopped
app_healthcheck_path: /health
compose_project_dir: "/opt/{{ app_name }}"
docker_compose_version: "3.8"

# Optional secret, recommended to override from vault/group vars.
app_secret_key: "change-me"

# Runtime env for the containerized app.
app_env:
  PORT: "{{ app_internal_port | string }}"
  APP_SECRET_KEY: "{{ app_secret_key }}"

# Wipe Logic Control
# Set to true to remove application completely.
# Wipe only:     ansible-playbook playbooks/deploy.yml -e "web_app_wipe=true" --tags web_app_wipe
# Clean install: ansible-playbook playbooks/deploy.yml -e "web_app_wipe=true"
web_app_wipe: false
